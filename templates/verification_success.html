<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Verified - ImaraDesk</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 16px;
            padding: 48px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .success-icon {
            width: 80px;
            height: 80px;
            background: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            animation: scaleIn 0.5s ease-out 0.2s both;
        }
        
        @keyframes scaleIn {
            from {
                transform: scale(0);
            }
            to {
                transform: scale(1);
            }
        }
        
        .success-icon svg {
            width: 40px;
            height: 40px;
            color: white;
        }
        
        .checkmark {
            stroke: white;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            animation: draw 0.6s ease-out 0.5s both;
        }
        
        @keyframes draw {
            from {
                stroke-dasharray: 100;
                stroke-dashoffset: 100;
            }
            to {
                stroke-dasharray: 100;
                stroke-dashoffset: 0;
            }
        }
        
        h1 {
            color: #111827;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 12px;
        }
        
        .workspace-name {
            color: #4a154b;
            font-weight: 600;
        }
        
        p {
            color: #6b7280;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 24px;
        }
        
        .redirect-text {
            color: #9ca3af;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #e5e7eb;
            border-top-color: #4a154b;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        
        .countdown {
            font-weight: 600;
            color: #4a154b;
        }
        
        .login-btn {
            display: inline-block;
            margin-top: 16px;
            padding: 12px 32px;
            background: #4a154b;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: background-color 0.2s, transform 0.2s, box-shadow 0.2s;
        }
        
        .login-btn:hover {
            background: #5a235c;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(74, 21, 75, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">
            <svg viewBox="0 0 24 24">
                <polyline class="checkmark" points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        
        <h1>Account Verified!</h1>
        
        <p>
            Your workspace <span class="workspace-name">{{ workspace_name }}</span> has been successfully verified. 
            You can now log in to your account.
        </p>
        
        <div class="redirect-text">
            <div class="spinner"></div>
            Redirecting to login in <span class="countdown" id="countdown">2</span> seconds...
        </div>
        
        <a href="{{ login_url }}" class="login-btn">Go to Login Now</a>
    </div>
    
    <script>
        const loginUrl = "{{ login_url }}";
        let seconds = 2;
        const countdownEl = document.getElementById('countdown');
        
        const interval = setInterval(() => {
            seconds--;
            countdownEl.textContent = seconds;
            
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = loginUrl;
            }
        }, 1000);
    </script>
</body>
</html>
